name: Linux

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
   runs-on: ${{ matrix.os }}
   strategy:
      matrix:
        name: [ubuntu-22.04, ubuntu-24.04]

        include:
          - name: ubuntu-22.04
            os: ubuntu-22.04
          - name: ubuntu-24.04
            os: ubuntu-24.04

   steps:
     - uses: actions/checkout@v6
     - uses: subosito/flutter-action@v2
       with:
         channel: 'stable'
     - run: |
        sudo apt-get update -y
        sudo apt-get install -y ninja-build libgtk-3-dev
     - name: Setup build environment
       run: |
          flutter config --enable-linux-desktop
          flutter pub get
     - name: Verify formatting
       run: dart format --output=none --set-exit-if-changed .
     - name: Run tests
       run: flutter test
     - name: Build executable
       run: flutter build linux --release
     - name: Create bundle
       run: |
          mkdir -p release
          pushd build/linux/x64/release/bundle/
          tar -czvf ../../../../../release/reqif-editor-${{ matrix.name }}-x64.tar.gz .
          popd
     - name: Archive production artifacts
       uses: actions/upload-artifact@v6
       with:
          name: reqif-editor-${{ matrix.name }}-x64.tar.gz
          path: release/reqif-editor-*
          retention-days: 30
     - name: Upload artifacts to release
       if: ${{ github.event_name == 'release' }}
       uses: svenstaro/upload-release-action@v2
       with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release/reqif-editor-*
          tag: ${{ github.ref }}
          file_glob: true
